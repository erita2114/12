<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>NFC名片註冊</title>

<style>

body{
font-family:sans-serif;
background:#f2f3f7;
padding:20px;
}

.card{
max-width:420px;
margin:auto;
background:white;
padding:24px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ddd;
border-radius:8px;
}

button{
width:100%;
padding:14px;
background:black;
color:white;
border:none;
border-radius:8px;
}

.result{
margin-top:20px;
background:#f5f5f5;
padding:12px;
border-radius:8px;
}

</style>

</head>

<body>

<div class="card">

<h2>建立電子名片</h2>

<input id="name" placeholder="姓名">
<input id="email" placeholder="Email">

<button onclick="register()">建立名片</button>

<div id="result" class="result"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbyrJD_CpQ4b1GMbslIEW5QJPELkJCLlBNsZXqcJjuPRkzG1JR6THaezgSNXfNGGbsz4yA/exec"

function register(){

alert("按鈕正常")

fetch(API,{
method:"POST",
body:JSON.stringify({

action:"register",
name:name.value,
email:email.value

})
})
.then(r=>r.json())
.then(d=>{

result.innerHTML=`
建立成功<br>
ID:${d.id}<br>
KEY:${d.key}
`

})

}

</script>

</body>
</html>
